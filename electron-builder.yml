appId: com.paritosh.cold
productName: Paritosh Cold
directories:
  output: release
  buildResources: resources
files:
  - out/**
  - package.json
extraResources:
  - from: drizzle
    to: drizzle
npmRebuild: true
win:
  target: nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
